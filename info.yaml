# Tiny Tapeout project information
project:
  title:        "double_dabble_SV"      # Project title
  author:       "Ole Henrik Moller"     # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Converts an 8-bit binary number to a decimal number displayed as a sequence of three BCD digits"      # One line description of what your project does
  language:     "SystemVerilog" # other examples include Verilog, SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     4       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_ole-moller_double_dabble_SV"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "top.v"
    - "double_dabble_SV.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "bin[0]"
  ui[1]: "bin[1]"
  ui[2]: "bin[2]"
  ui[3]: "bin[3]"
  ui[4]: "bin[4]"
  ui[5]: "bin[5]"
  ui[6]: "bin[6]"
  ui[7]: "bin[7]"

  # Outputs
  uo[0]: "segments[0]"
  uo[1]: "segments[1]"
  uo[2]: "segments[2]"
  uo[3]: "segments[3]"
  uo[4]: "segments[4]"
  uo[5]: "segments[5]"
  uo[6]: "segments[6]"
  uo[7]: "separator"

  # Bidirectional pins
  uio[0]: "bcd_tens_ones[0]"
  uio[1]: "bcd_tens_ones[1]"
  uio[2]: "bcd_tens_ones[2]"
  uio[3]: "bcd_tens_ones[3]"
  uio[4]: "bcd_tens_ones[4]"
  uio[5]: "bcd_tens_ones[5]"
  uio[6]: "bcd_tens_ones[6]"
  uio[7]: "bcd_tens_ones[7]"

# Do not change!
yaml_version: 6
